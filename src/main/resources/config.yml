# ---General---
# MiniMessage-formatted prefix (https://docs.advntr.dev/minimessage/format.html)
prefix: <dark_gray>[<green>Chat<white>-<dark_red>OG<dark_gray>]

blocklist:
  enabled: true
  # Only blocklists with just a list of domains
  blocklists:
    - https://raw.githubusercontent.com/hagezi/dns-blocklists/main/domains/multi.txt
    - https://raw.githubusercontent.com/hagezi/dns-blocklists/main/wildcard/nsfw-onlydomains.txt

# ---Redis---
redis:
  host: 127.0.0.1
  password: ^{KEYDB_PASSWORD}
  port: 6379
  database: 0

# TODO: Enable translation.
# ---OpenAI API Translation---
# Any OpenAI-compatible (OpenAI, ollama, llama.cpp) API will work here
openai:
  enabled: false
  # Will be used as: <baseurl>/v1/...
  baseUrl: http://127.0.0.1:8080
  apiKey: ^{OPENAI_API_KEY}
  # The name of the model. This isn't always required, for example with the llama-server "example" from llama.cpp
  model: ""

# ---Discord---
# discordEnabled needs to be true for staffDiscordEnabled and premiumDiscordEnabled to have any effect
discord:
  enabled: true
  botToken: ^{DISCORD_BOT_TOKEN}
  guildId: ^{DISCORD_GUILD_ID}

  # Status and messages
  status: Minecraft 1.19.4
  serverHasStartedMessage: ^{BRAND_NAME} 1.19.4 Beta 2 Server has started! <:stonks:899680228216029195>
  serverHasStoppedMessage: ^{BRAND_NAME} 1.19.4 Beta 2 Server has stopped! <:notstonks:939288625701617665>

  general:
    channelId: ^{DISCORD_CHANNEL_ID}
    webhook: ^{DISCORD_MAIN_WEBHOOK}

  staff:
    enabled: true
    channelId: ^{DISCORD_STAFF_ID}
    webhook: ^{DISCORD_STAFF_WEBHOOK}

  premium:
    enabled: true
    channelId: ^{DISCORD_PREMIUM_ID}
    webhook: ^{DISCORD_PREMIUM_WEBHOOK}

  developer:
    enabled: true
    channelId: ^{DISCORD_DEVELOPER_ID}
    webhook: ^{DISCORD_DEVELOPER_WEBHOOK}

  # List players command
  listCommandName: list
  # Available placeholders: %onlineplayers%, %maxplayers%
  listCommandText: "There are %onlineplayers% out of maximum 200 players online."

  # Color code roles
  # When true, only Discord users with one of the colorCodeRoles below can use
  # Utilities-OG ColorCodeMap Bukkit codes (&c, &l, &*) or MiniMessage tags
  # in Discord -> Minecraft chat. All others have their input stripped of
  # formatting before it is rendered in-game.
  useColorCodeRoles: true

  # Discord role IDs allowed to use color codes from Discord.
  colorCodeRoles:
    - "897300356395073546" # OG-Pro
    - "934876475285467247" # OG Master
    - "897299946926125167" # Tester (same level as OG Master)
    - "897299018407890945" # YouTube
    - "1391741516204081162" # Technical Contributor
    - "1096297706034569287" # Helper
    - "897776965849858101" # Builder
    - "916661431850639420" # MVP
    - "1080912883694719047" # Developer
    - "897297817574440970" # Moderator
    - "897296878490763344" # Admin

  # Default Minecraft chat color applied to a Discord -> Minecraft message when
  # the sender did not type their own color code. If a user has multiple
  # configured roles the entry for their highest-positioned role wins.
  roles:
    "897657230575431710": # Member
      messageColor: gray
    "897300768619659314": # OG
      messageColor: white
    "897300356395073546": # OG-Pro
      messageColor: white
    "934876475285467247": # OG Master
      messageColor: white
    "897299946926125167": # Tester
      messageColor: white
    "897299018407890945": # YouTube
      messageColor: white
    "1391741516204081162": # Technical Contributor
      messageColor: white
    "1096297706034569287": # Helper
      messageColor: white
    "897776965849858101": # Builder
      messageColor: white
    "916661431850639420": # MVP
      messageColor: white
    "1080912883694719047": # Developer
      messageColor: white
    "897297817574440970": # Moderator
      messageColor: white
    "897296878490763344": # Admin
      messageColor: white
